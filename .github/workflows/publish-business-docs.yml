# Publishes the business documentation site (a Zola site at the repository
# root) to GitHub Pages.
#
# REQUIRED one-time repository setup before the first run:
#   Settings → Pages → Source: "GitHub Actions"
# (The default GITHUB_TOKEN cannot enable Pages itself — configure-pages'
# `enablement` option needs an admin token — so this manual step is mandatory;
# without it the "Configure GitHub Pages" step fails.)
name: Publish business docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; let an in-flight deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  ZOLA_VERSION: 0.22.1 # keep in sync with the version used locally

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Zola
        run: |
          curl -fsSL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | sudo tar xz -C /usr/local/bin zola
          zola --version

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6

      # config.toml keeps `base_url = "/"` for local dev; the real Pages URL
      # (including the /<repo> sub-path for project sites) is injected here.
      - name: Build site
        run: zola build --base-url "${{ steps.pages.outputs.base_url }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
